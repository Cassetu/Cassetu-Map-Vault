<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/other/vault.png">
    <title>Cassetu's Map Vault</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/maps-data.js"></script>
    <script src="js/app.js"></script>
</head>
<body>
<div class="navigation-wrapper">
    <div class="topbar">
        <div class="topbar-brand">
            <img src="assets/other/vault.png" alt="cube" class="brand-icon" />
            <img src="assets/other/cassetu's_map_vault.png" alt="Cassetu's Map Vault" class="brand-title-img" />
        </div>
        <button class="search-toggle-btn" id="searchToggle">
            <p class="search-text">Filters</p>
            <img src="assets/icons/search.svg" alt="Search" class="inner-search-icon" />
            <span class="search-btn-arrow">&#10148;</span>
        </button>
    </div>

    <div class="search-dashboard" id="searchDashboard">
        <div class="dashboard-content">

            <div class="dashboard-search-row">
                <img src="assets/icons/search.svg" alt="Search" class="search-btn-icon" />
                <input type="text" id="mapSearch" placeholder="Search maps...">
            </div>
            <div class="filter-group">
                <div id="tagFilters" class="filter-container"></div>
            </div>
            <div class="dashboard-filter-selectors">
                <div class="filter-group">
                    <label>Minecraft Version</label>
                    <select id="versionFilter">
                        <option value="all">All Versions</option>
                        <option value="26.2">26.2</option>
                        <option value="1.21.11">1.21.11</option>
                        <option value="1.21.1">1.21.1</option>
                        <option value="1.20.1">1.20.1</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Game Mode</label>
                    <select id="modeFilter">
                        <option value="all">All Modes</option>
                        <option value="solo">Solo</option>
                        <option value="multiplayer">Multiplayer / Co-op</option>
                    </select>
                </div>


            </div>

        </div>
    </div>
</div>
<header class="vault-hero">
    <div class="hero-content">
        <img src="assets/other/cassetu's_map_vault.png" alt="Cassetu's Map Vault" class="hero-title-img" />
        <p>Easy download minigame maps to play with your by yourself or with friends!</p>
    </div>
</header>

<main class="map-grid" id="mapGrid">
</main>

<div id="mapModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="closeModal">&times;</span>

        <h2 id="modalTitle">Map Title</h2>
        <div id="modalTags" class="modal-tags"></div>

        <div class="carousel">
            <button class="carousel-btn prev" id="prevBtn">&#10094;</button>
            <div class="carousel-slide">
                <img id="carouselImage" src="" alt="Map Screenshot">
            </div>
            <button class="carousel-btn next" id="nextBtn">&#10095;</button>
        </div>

        <p id="modalDescription">Map description goes here...</p>

        <div class="download-container">
            <a id="modalDownload" href="#" download class="download-btn">Download Map</a>
        </div>
    </div>
</div>
<footer class="vault-footer">
    <div class="footer-content">
        <div class="footer-text-group">
            <p class="footer-copyright">&copy; 2026 Cassetu's Map Vault | All Rights Reserved.</p>
            <p style="font-weight:bold;" class="footer-disclaimer">Minecraft is a trademark of Mojang and Cassetu's Map Vault is not affiliated with or endorsed by Mojang.</p>
        </div>

        <div class="footer-socials">
            <a href="https://discord.gg/NBwbcqvkCJ" target="_blank" rel="noopener" title="Join our Discord">
                <img class="social-icon discord-social" src="assets/icons/media/discord.webp" alt="Discord" />
            </a>
            <a href="https://youtube.com/@Cassetu" target="_blank" rel="noopener" title="Subscribe on YouTube">
                <img class="social-icon yt-social" src="assets/icons/media/youtube.webp" alt="YouTube" />
            </a>
        </div>
    </div>
</footer>
</body>
</html>
